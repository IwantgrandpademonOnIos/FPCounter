name: Build FPCounter

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        config:
          - { target: windows,   platform: windows }
          - { target: macos,     platform: macos }
          - { target: ios,       platform: ios }
          - { target: android32, platform: android32 }
          - { target: android64, platform: android64 }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Geode CLI
        run: |
          GEODE_VERSION="5.8.2"
          curl -L "https://github.com/geode-sdk/geode/releases/download/v${GEODE_VERSION}/geode-linux-x64" -o geode
          chmod +x geode
          sudo mv geode /usr/local/bin/geode

      - name: Verify Geode CLI
        run: geode --version

      - name: Build mod using CLI
        run: |
          geode build \
            --target ${{ matrix.config.target }} \
            --platform ${{ matrix.config.platform }} \
            --combine

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPCounter-${{ matrix.config.platform }}
          path: build/*
