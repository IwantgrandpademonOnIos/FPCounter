name: Build iOS Mod

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug API Installer (still harmless)
      - name: Debug API Installer
        run: |
          echo "Downloading API installer..."
          curl -fsSL https://geode-sdk.org/api/install -o api_installer.txt || true
          echo "First 20 lines of API installer:"
          head -n 20 api_installer.txt || true

      # Install Geode CLI from official SDK release
      - name: Install Geode CLI (SDK Binary)
        run: |
          echo "Downloading Geode SDK..."
          curl -L https://github.com/geode-sdk/geode/releases/latest/download/geode-sdk-macos.zip -o geode-sdk.zip
          echo "Extracting SDK..."
          unzip geode-sdk.zip -d geode-sdk
          echo "Installing Geode CLI..."
          mkdir -p $HOME/.local/bin
          cp geode-sdk/bin/geode $HOME/.local/bin/geode
          chmod +x $HOME/.local/bin/geode
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Geode CLI
        run: geode --version

      - name: Build iOS mod
        run: geode build --platform ios --target ios --combine

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/*
