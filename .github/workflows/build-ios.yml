name: Build iOS Mod

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Geode Installer
        run: |
          curl -fsSL https://geode-sdk.org/install -o geode-install.sh
          chmod +x geode-install.sh

      - name: Run Geode Installer (Verbose)
        run: |
          bash geode-install.sh -v

      - name: Locate Geode CLI
        run: |
          echo "Searching for geode binary..."
          find /Users/runner -type f -name geode -print
          find /usr/local -type f -name geode -print
          find $HOME -type f -name geode -print

      - name: Add Geode CLI to PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.geode/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/geode/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Verify Geode CLI
        run: geode --version

      - name: Build iOS mod
        run: geode build --platform ios --target ios --combine

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/*
