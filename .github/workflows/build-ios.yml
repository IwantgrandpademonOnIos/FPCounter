name: Build iOS Mod

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug API Installer (but don't fail the job)
      - name: Debug API Installer
        run: |
          echo "Downloading API installer..."
          curl -fsSL https://geode-sdk.org/api/install -o api_installer.txt || true
          echo "First 20 lines of API installer:"
          head -n 20 api_installer.txt || true

      # Manual undocumented Geode CLI install (the only working method)
      - name: Install Geode CLI (Manual)
        run: |
          echo "Cloning Geode repository..."
          git clone https://github.com/geode-sdk/geode.git
          cd geode
          echo "Running Geode installer script..."
          ./install.sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.geode/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/geode/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Verify Geode CLI
        run: geode --version

      - name: Build iOS mod
        run: geode build --platform ios --target ios --combine

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/*
