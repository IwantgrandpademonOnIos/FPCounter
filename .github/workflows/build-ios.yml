name: Build iOS Mod

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug API Installer
        run: |
          echo "Downloading API installer..."
          curl -fsSL https://geode-sdk.org/api/install -o api_installer.txt || true
          echo "First 20 lines of API installer:"
          head -n 20 api_installer.txt || true

      - name: Download Geode CLI (macOS)
        run: |
          echo "Downloading Geode CLI..."
          curl -L "https://geode-sdk.org/download/cli?platform=macos" -o geode-cli

      - name: Install Geode CLI
        run: |
          echo "Installing Geode CLI..."
          mkdir -p $HOME/.local/bin
          cp geode-cli $HOME/.local/bin/geode
          chmod +x $HOME/.local/bin/geode
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Geode CLI
        run: geode --version

      - name: Build iOS mod
        run: geode build --platform ios --target ios --combine

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/*
