name: Build iOS Mod

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug API Installer
        run: |
          echo "Downloading API installer..."
          curl -fsSL https://geode-sdk.org/api/install -o api_installer.txt || true
          echo "First 20 lines of API installer:"
          head -n 20 api_installer.txt || true

      - name: Download Geode SDK (Auto-detect correct asset)
        run: |
          echo "Fetching release metadata..."
          curl -s https://api.github.com/repos/geode-sdk/geode/releases/latest > release.json

          echo "Finding macOS SDK asset..."
          SDK_URL=$(cat release.json | grep browser_download_url | grep macos | cut -d '"' -f 4)

          echo "Downloading SDK from: $SDK_URL"
          curl -L "$SDK_URL" -o geode-sdk.zip

      - name: Install Geode CLI (SDK Binary)
        run: |
          echo "Extracting SDK..."
          unzip geode-sdk.zip -d geode-sdk

          echo "Installing Geode CLI..."
          mkdir -p $HOME/.local/bin
          cp geode-sdk/bin/geode $HOME/.local/bin/geode
          chmod +x $HOME/.local/bin/geode
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Geode CLI
        run: geode --version

      - name: Build iOS mod
        run: geode build --platform ios --target ios --combine

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/*
