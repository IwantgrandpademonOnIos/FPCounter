name: Build iOS Mod

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Installer (Debug)
        run: |
          echo "Downloading installer..."
          curl -fsSL https://geode-sdk.org/install -o installer.txt
          echo "First 20 lines of installer:"
          head -n 20 installer.txt

      - name: Try Running Installer
        run: |
          echo "Attempting to run installer..."
          bash installer.txt || true

      - name: Locate Geode CLI
        run: |
          echo "Searching for geode binary..."
          find /Users/runner -type f -name geode -print
          find /usr/local -type f -name geode -print
          find $HOME -type f -name geode -print

      - name: Add Geode CLI to PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.geode/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/geode/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Verify Geode CLI
        run: geode --version

      - name: Build iOS mod
        run: geode build --platform ios --target ios --combine

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/*
